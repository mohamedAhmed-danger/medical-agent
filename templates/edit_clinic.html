{% extends "base.html" %}
{% block title %}تعديل عيادة{% endblock %}

{% block content %}

<div class="page-header" data-animate>
  <div>
    <h1 class="page-title">تعديل عيادة</h1>
    <p class="page-subtitle">تحديث بيانات العيادة</p>
  </div>
  <a href="{{ url_for('list_clinics') }}" class="btn btn-ghost">
    <i data-lucide="arrow-right" style="width:16px;height:16px"></i>
    العودة
  </a>
</div>

<div class="card" style="max-width:600px" data-animate data-delay="60">
  <div class="card-header">
    <span class="card-title">بيانات العيادة</span>
    <div style="
      width:38px; height:38px;
      background:rgba(245,158,11,0.12);
      border-radius:var(--radius-sm);
      display:flex; align-items:center; justify-content:center;
      color:var(--accent-light);
    ">
      <i data-lucide="pencil" style="width:18px;height:18px"></i>
    </div>
  </div>

  <form method="POST" action="{{ url_for('edit_clinic', clinic_id=clinic.id) }}" autocomplete="off">
    <div class="form-grid">

      <div class="form-group full-width">
        <label for="name">اسم العيادة</label>
        <div class="input-icon-wrapper">
          <i class="input-icon" data-lucide="building-2" style="width:15px;height:15px"></i>
          <input
            type="text" id="name" name="name"
            class="form-control"
            value="{{ clinic.name }}"
            required autofocus
          >
        </div>
      </div>

      <div class="form-group full-width">
        <label for="address">العنوان</label>
        <div class="input-icon-wrapper">
          <i class="input-icon" data-lucide="map-pin" style="width:15px;height:15px"></i>
          <input
            type="text" id="address" name="address"
            class="form-control"
            value="{{ clinic.address or '' }}"
          >
        </div>
      </div>

      <div class="form-group full-width">
        <label for="info">معلومات إضافية</label>
        <textarea
          id="info" name="info"
          class="form-control"
          rows="3"
        >{{ clinic.info or '' }}</textarea>
        <span class="form-hint">اختياري — أي تفاصيل مفيدة عن العيادة.</span>
      </div>

    </div>

    <div class="form-actions">
      <button type="submit" class="btn btn-primary btn-submit">
        <i data-lucide="save" style="width:16px;height:16px"></i>
        حفظ التغييرات
      </button>
      <a href="{{ url_for('list_clinics') }}" class="btn btn-ghost">إلغاء</a>
    </div>
  </form>
</div>

{% endblock %}

{% block scripts %}
<script>lucide.createIcons();</script>
{% endblock %}
