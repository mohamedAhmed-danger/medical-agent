{% extends 'base.html' %}

{% block title %}تعديل طبيب{% endblock %}

{% block content %}

<div class="page-header">
    <h1 class="page-title">تعديل الطبيب</h1>
</div>

<div class="card">

<form method="POST">

<div class="form-grid">

<div class="form-group">
<label>اسم الطبيب</label>
<input type="text"
       name="name"
       class="form-control"
       value="{{ doctor.name }}"
       required>
</div>

<div class="form-group full-width">
<label>معلومات الطبيب</label>
<textarea name="doctor_info"
          class="form-control"
          required>{{ doctor.doctor_info }}</textarea>
</div>

</div>

<div class="form-actions">

<button type="submit"
        class="btn btn-primary btn-submit">
تحديث
</button>

<a href="{{ url_for('list_doctors') }}"
   class="btn btn-ghost">
إلغاء
</a>

</div>

</form>

</div>

{% endblock %}
