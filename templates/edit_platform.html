{% extends 'base.html' %}

{% block title %}تعديل منصة{% endblock %}

{% block content %}

<div class="page-header">
  <div>
    <h1 class="page-title">تعديل المنصة</h1>
    <p class="page-subtitle">تعديل بيانات المنصة: {{ platform.name }}</p>
  </div>
</div>

<div class="card">
  <!-- التعديل هنا: بنبعت الـ POST لعنوان الـ edit وبنمرر الـ id بتاع المنصة -->
  <form action="{{ url_for('edit_platform', platform_id=platform.id) }}" method="POST">

    <div class="form-grid">
      <div class="form-group full-width">
        <label>اسم المنصة</label>
        <input
          type="text"
          name="name"
          class="form-control"
          maxlength="100"
          value="{{ platform.name }}"
          required
        >
      </div>
    </div>

    <div class="form-actions">
      <button type="submit" class="btn btn-primary btn-submit">
        حفظ التعديل
      </button>

      <a href="{{ url_for('list_platforms') }}" class="btn btn-ghost">
        رجوع
      </a>
    </div>

  </form>
</div>

{% endblock %}
