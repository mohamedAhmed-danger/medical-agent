{% extends 'base.html' %}

{% block title %}الأطباء{% endblock %}

{% block content %}

<div class="page-header">
    <div>
        <h1 class="page-title">الأطباء</h1>
        <p class="page-subtitle">إدارة جميع الأطباء</p>
    </div>

    <a href="{{ url_for('create_doctor') }}" class="btn btn-primary">
        إضافة طبيب
    </a>
</div>

<div class="card">

    <div class="toolbar">
        <div class="search-box">
            <input type="text" id="tableSearch" placeholder="بحث...">
        </div>
    </div>

    <div class="table-wrapper">
        <table>
            <thead>
                <tr>
                    <th>#</th>
                    <th>الاسم</th>
                    <th>المعلومات</th>
                    <th>الإجراءات</th>
                </tr>
            </thead>

            <tbody>
                {% for doctor in doctors %}
                <tr>
                    <td>{{ doctor.id }}</td>
                    <td>{{ doctor.name }}</td>
                    <td>{{ doctor.doctor_info }}</td>
                    <td class="table-actions">
                        <a href="{{ url_for('edit_doctor', doctor_id=doctor.id) }}"
                           class="btn btn-ghost">
                            تعديل
                        </a>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>

</div>

{% endblock %}
