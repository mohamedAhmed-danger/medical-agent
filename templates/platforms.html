{% extends 'base.html' %}

{% block title %}المنصات{% endblock %}

{% block content %}

<div class="page-header">

  <div>
    <h1 class="page-title">المنصات</h1>

    <p class="page-subtitle">
      إدارة جميع المنصات
    </p>
  </div>

  <a
    href="{{ url_for('create_platform') }}"
    class="btn btn-primary"
  >
    <i data-lucide="plus"></i>
    إضافة منصة
  </a>

</div>

<div class="card">

  <div class="card-header">

    <h2 class="card-title">
      قائمة المنصات
    </h2>

  </div>

  <div class="toolbar">

    <div class="search-box">

      <i data-lucide="search" class="search-icon"></i>

      <input
        type="text"
        id="tableSearch"
        placeholder="ابحث عن منصة..."
      >

    </div>

  </div>

  <div class="table-wrapper">

    <table>

      <thead>

        <tr>
          <th>#</th>
          <th>اسم المنصة</th>
          <th>الإجراءات</th>
        </tr>

      </thead>

      <tbody>

        {% for platform in platforms %}

        <tr>

          <td>{{ platform.id }}</td>

          <td>
            <span class="badge badge-primary">
              {{ platform.name }}
            </span>
          </td>

          <td class="table-actions">

            <a
              href="{{ url_for('edit_platform', platform_id=platform.id) }}"
              class="btn btn-ghost btn-icon"
            >
              <i data-lucide="pencil"></i>
            </a>

          </td>

        </tr>

        {% endfor %}

      </tbody>

    </table>

  </div>

</div>

{% endblock %}
