{% extends 'base.html' %}
{% block title %}تعديل صفحة{% endblock %}
{% block content %}

<div class="page-header">
  <div>
    <h1 class="page-title">تعديل الصفحة</h1>
    <p class="page-subtitle">تعديل بيانات الصفحة: {{ page.page_id }}</p>
  </div>
</div>

<div class="card">
  <form action="{{ url_for('edit_page', platform_id=page.platform_id, page_id=page.page_id) }}" method="POST">
    <div class="form-grid">

      <div class="form-group full-width">
        <label>العيادة</label>
        <input type="text" class="form-control" value="{{ page.clinic.name }}" disabled>
        <input type="hidden" name="clinic_id" value="{{ page.clinic_id }}">
      </div>

      <div class="form-group full-width">
        <label>المنصة</label>
        <input type="text" class="form-control" value="{{ page.platform.name }}" disabled>
        <input type="hidden" name="platform_id" value="{{ page.platform_id }}">
      </div>

      <div class="form-group full-width">
        <label>Page ID</label>
        <input type="text" name="page_id" class="form-control" value="{{ page.page_id }}" required>
      </div>

      <div class="form-group full-width">
        <label>Token</label>
        <input type="text" name="token" class="form-control" value="{{ page.token }}" required>
      </div>

    </div>
    <div class="form-actions">
      <button type="submit" class="btn btn-primary btn-submit">حفظ التعديل</button>
      <a href="{{ url_for('list_pages') }}" class="btn btn-ghost">رجوع</a>
    </div>
  </form>
</div>

{% endblock %}
