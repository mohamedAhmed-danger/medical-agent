{% extends 'base.html' %}

{% block title %}إضافة خدمة{% endblock %}

{% block content %}

<div class="page-header">

  <div>
    <h1 class="page-title">إضافة خدمة</h1>

    <p class="page-subtitle">
      إنشاء خدمة طبية جديدة
    </p>
  </div>

</div>

<div class="card">

<form method="POST">

  <div class="form-grid">

    <div class="form-group">

      <label>اسم الخدمة</label>

      <input
        type="text"
        name="name"
        class="form-control"
        maxlength="100"
        required
      >

    </div>

    <div class="form-group">

      <label>العيادة</label>

      <select
        name="clinic_id"
        class="form-control"
        required
      >

        {% for clinic in clinics %}

        <option value="{{ clinic.id }}">
          {{ clinic.name }}
        </option>

        {% endfor %}

      </select>

    </div>

    <div class="form-group">

      <label>السعر</label>

      <input
        type="number"
        step="0.01"
        name="price"
        class="form-control"
        required
      >

    </div>

    <div class="form-group full-width">

      <label>وصف الخدمة</label>

      <textarea
        name="description"
        class="form-control"
        rows="5"
        maxlength="200"
      ></textarea>

    </div>

  </div>

  <div class="form-actions">

    <button
      type="submit"
      class="btn btn-primary btn-submit"
    >
      حفظ
    </button>

    <a
      href="{{ url_for('list_services') }}"
      class="btn btn-ghost"
    >
      رجوع
    </a>

  </div>

</form>

</div>

{% endblock %}
