{% extends 'base.html' %}

{% block title %}إضافة منصة{% endblock %}

{% block content %}

<div class="page-header">
  <div>
    <h1 class="page-title">إضافة منصة</h1>
    <p class="page-subtitle">إنشاء منصة جديدة</p>
  </div>
</div>

<div class="card">
  <!-- التعديل هنا: ضفنا الـ action عشان يروح للـ route بتاع الـ create_platform -->
  <form action="{{ url_for('create_platform') }}" method="POST">

    <div class="form-grid">
      <div class="form-group full-width">
        <label>اسم المنصة</label>
        <input
          type="text"
          name="name"
          class="form-control"
          maxlength="100"
          placeholder="مثلاً: WhatsApp أو Facebook"
          required
        >
      </div>
    </div>

    <div class="form-actions">
      <button type="submit" class="btn btn-primary btn-submit">
        حفظ
      </button>

      <a href="{{ url_for('list_platforms') }}" class="btn btn-ghost">
        رجوع
      </a>
    </div>

  </form>
</div>

{% endblock %}
